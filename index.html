<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calorie Guard - 찬둥 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Nanum+Pen+Script&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 22px; color: #ef4444; transform: rotate(-10deg) translateY(6px); margin-right: 4px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<link rel="apple-touch-icon" href="./icon.png">
<link rel="icon" href="./icon.png">
</head>
<body class="p-4 flex flex-col items-center min-h-screen pb-24">

    <header class="text-center my-8 flex items-center justify-center">
        <span class="chan-doong-signature">찬둥의</span>
        <h1 class="text-4xl font-black text-slate-900 italic tracking-tighter leading-none">CALORIE GUARD</h1>
    </header>

    <div class="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl p-10 mb-8 border-b-[14px] border-rose-500 text-center relative overflow-hidden">
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-3">Total Intake Today</p>
        <div class="flex items-baseline justify-center gap-1">
            <span id="totalDisplay" class="text-7xl font-black text-rose-500 italic leading-none tracking-tighter">0</span>
            <span class="text-2xl font-bold text-rose-500 italic">Kcal</span>
        </div>
    </div>

    <div class="w-full max-w-sm bg-white rounded-3xl p-5 shadow-sm mb-6 border border-slate-200">
        <div class="relative mb-4">
            <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-slate-400"></i>
            <input type="text" id="searchInput" onkeyup="searchFood()" placeholder="음식/카테고리 검색 (예: 과자, 고기, 찌개)" 
                   class="w-full pl-10 p-3.5 border rounded-2xl text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-rose-500 font-bold">
        </div>
        <div id="searchResult" class="flex gap-2 overflow-x-auto hide-scrollbar py-1 min-h-[44px]">
            <p class="text-[11px] text-slate-400 p-2 font-bold italic tracking-tighter">통합 카테고리 120종 탑재 완료!</p>
        </div>
    </div>

    <div id="addSection" class="w-full max-w-sm bg-slate-900 rounded-[2rem] p-6 mb-8 hidden shadow-2xl animate-in fade-in zoom-in duration-300">
        <div class="flex justify-between items-center mb-4">
            <span id="selectedName" class="text-white font-black text-xl italic uppercase">SELECTED</span>
            <span id="selectedUnitCal" class="text-rose-400 text-xs font-bold italic">0 Kcal/Unit</span>
        </div>
        <div class="flex gap-4 items-center">
            <input type="number" id="amount" value="1" step="0.5" class="w-24 p-4 rounded-2xl bg-slate-800 text-white text-center text-2xl font-black outline-none border border-slate-700 text-rose-500">
            <button onclick="confirmAdd()" class="flex-grow bg-rose-500 text-white p-4 rounded-2xl font-black text-xl active:scale-95 transition shadow-lg shadow-rose-900/40 italic">ADD NOW</button>
        </div>
    </div>

    <div class="w-full max-w-sm space-y-3 flex-grow mb-10" id="historyList"></div>

    <div class="w-full max-w-sm space-y-6 mt-10 mb-10">
        <div class="text-center">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="inline-flex items-center gap-2 bg-[#FAE100] text-[#3C1E1E] px-8 py-4 rounded-2xl font-black text-sm shadow-md active:scale-95 transition">
                <i data-lucide="coffee" class="w-5 h-5"></i> 찬둥에게 커피 후원하기
            </a>
        </div>
        <div class="bg-white border border-slate-200 rounded-3xl p-5 shadow-sm">
            <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                <input type="hidden" name="channel" value="AF4757238">
                <input type="text" name="q" placeholder="식단 보조제 최저가 검색" class="flex-grow p-3 border rounded-xl text-sm bg-slate-50 outline-none text-black font-semibold">
                <button type="submit" class="bg-slate-800 text-white px-5 rounded-xl font-bold text-xs active:scale-95 transition">검색</button>
            </form>
            <p class="text-[9px] text-slate-400 mt-3 text-center leading-tight">"이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."</p>
        </div>
    </div>

    <script>
        // 기본 마스터 데이터
        let defaultDB = [
            {name: '흰쌀밥', cal: 300}, {name: '잡곡밥', cal: 320}, {name: '볶음밥', cal: 600}, {name: '김밥', cal: 480}, {name: '삼각김밥', cal: 200}, {name: '죽(쇠고기)', cal: 250}, {name: '야채죽', cal: 180}, {name: '비빔밥', cal: 550}, {name: '덮밥(제육)', cal: 650}, {name: '덮밥(불고기)', cal: 600}, {name: '회덮밥', cal: 500}, {name: '초밥(10p)', cal: 500}, {name: '오므라이스', cal: 700}, {name: '카레라이스', cal: 550}, {name: '하이라이스', cal: 550},
            {name: '라면', cal: 500}, {name: '비빔면', cal: 530}, {name: '짜장면', cal: 800}, {name: '짬뽕', cal: 700}, {name: '칼국수', cal: 600}, {name: '잔치국수', cal: 400}, {name: '냉면', cal: 500}, {name: '쫄면', cal: 550}, {name: '우동', cal: 400}, {name: '파스타(크림)', cal: 800}, {name: '파스타(토마토)', cal: 500}, {name: '메밀소바', cal: 350}, {name: '쌀국수', cal: 350}, {name: '마라탕', cal: 800}, {name: '비빔국수', cal: 450},
            {name: '김치찌개', cal: 250}, {name: '된장찌개', cal: 200}, {name: '부대찌개', cal: 500}, {name: '순두부찌개', cal: 250}, {name: '청국장', cal: 300}, {name: '미역국', cal: 100}, {name: '콩나물국', cal: 50}, {name: '육개장', cal: 350}, {name: '갈비탕', cal: 450}, {name: '삼계탕', cal: 900}, {name: '설렁탕', cal: 400}, {name: '추어탕', cal: 350}, {name: '감자탕', cal: 600}, {name: '매운탕', cal: 300}, {name: '국밥(돼지)', cal: 600},
            {name: '삼겹살(200g)', cal: 650}, {name: '돼지갈비(200g)', cal: 500}, {name: '소고기구이', cal: 400}, {name: '닭가슴살(100g)', cal: 110}, {name: '스테이크', cal: 600}, {name: '보쌈(1인분)', cal: 800}, {name: '족발(1인분)', cal: 900}, {name: '훈제오리', cal: 500}, {name: '불고기', cal: 350}, {name: '닭볶음탕', cal: 600}, {name: '오리주물럭', cal: 600}, {name: '소시지구이', cal: 300}, {name: '베이컨', cal: 250}, {name: '햄버그스테이크', cal: 500}, {name: '곱창구이', cal: 700},
            {name: '치킨(후라이드)', cal: 2500}, {name: '치킨(양념)', cal: 2800}, {name: '피자(L한판)', cal: 2400}, {name: '햄버거(단품)', cal: 500}, {name: '감자튀김(M)', cal: 350}, {name: '샌드위치', cal: 400}, {name: '돈가스', cal: 700}, {name: '생선까스', cal: 600}, {name: '핫도그', cal: 300}, {name: '타코/브리또', cal: 500},
            {name: '떡볶이(1인분)', cal: 400}, {name: '순대', cal: 400}, {name: '튀김(모듬)', cal: 500}, {name: '어묵(2개)', cal: 200}, {name: '만두(5개)', cal: 350}, {name: '순대볶음', cal: 700}, {name: '라볶이', cal: 600}, {name: '계란말이', cal: 300}, {name: '파전/부침개', cal: 500}, {name: '핫바', cal: 250},
            {name: '과자(한봉지)', cal: 450}, {name: '초콜릿', cal: 500}, {name: '캔디/사탕', cal: 100}, {name: '껌(1통)', cal: 30}, {name: '쿠키/비스킷', cal: 300}, {name: '케이크(1조각)', cal: 400}, {name: '도넛(1개)', cal: 250}, {name: '빵(단팥빵 등)', cal: 300}, {name: '머핀', cal: 350}, {name: '마카롱', cal: 150},
            {name: '아이스크림(바)', cal: 150}, {name: '아이스크림(콘)', cal: 250}, {name: '아이스크림(통)', cal: 900}, {name: '우유(200ml)', cal: 130}, {name: '요거트', cal: 100}, {name: '치즈(1장)', cal: 60}, {name: '두유', cal: 120}, {name: '버터', cal: 100}, {name: '생크림', cal: 200}, {name: '요구르트', cal: 50},
            {name: '탄산음료', cal: 150}, {name: '제로탄산', cal: 0}, {name: '아메리카노', cal: 10}, {name: '카페라떼', cal: 150}, {name: '과일주스', cal: 120}, {name: '에너지드링크', cal: 100}, {name: '소주(1병)', cal: 400}, {name: '맥주(500ml)', cal: 200}, {name: '막걸리', cal: 350}, {name: '와인/양주(잔)', cal: 100},
            {name: '사과', cal: 50}, {name: '바나나', cal: 90}, {name: '수박/멜론', cal: 100}, {name: '포도/귤', cal: 60}, {name: '샐러드', cal: 150}, {name: '고구마', cal: 130}, {name: '감자', cal: 80}, {name: '토마토', cal: 30}, {name: '딸기/블루베리', cal: 50}, {name: '견과류(한줌)', cal: 150}
        ];

        // 로컬 스토리지에서 커스텀 음식 가져오기
        let customDB = JSON.parse(localStorage.getItem('chan_custom_foods')) || [];
        let foodDB = [...defaultDB, ...customDB];

        let totalCals = 0;
        let selectedFood = null;

        function searchFood() {
            const input = document.getElementById('searchInput').value.trim();
            const resultDiv = document.getElementById('searchResult');
            resultDiv.innerHTML = '';
            if(!input) return;

            const filtered = foodDB.filter(f => f.name.includes(input));
            
            if(filtered.length === 0) {
                // 검색 결과 없을 때 직접 등록 버튼 표시
                resultDiv.innerHTML = `
                    <button onclick="addNewFoodPrompt('${input}')" class="text-xs bg-slate-800 text-white px-5 py-2.5 rounded-full font-black italic shadow-md animate-pulse">
                        + '${input}' 직접 등록하기
                    </button>`;
                return;
            }

            filtered.forEach(f => {
                const btn = document.createElement('button');
                btn.className = "text-xs bg-white border-2 border-slate-100 px-5 py-2.5 rounded-full font-black whitespace-nowrap shadow-sm hover:border-rose-500 hover:text-rose-500 transition-all italic";
                btn.innerText = `${f.name} (${f.cal})`;
                btn.onclick = () => selectFood(f);
                resultDiv.appendChild(btn);
            });
        }

        // 사용자가 새 음식을 직접 등록할 때 호출
        function addNewFoodPrompt(name) {
            const calInput = prompt(`누님, '${name}'은(는) 1인분에 몇 칼로리(Kcal)입니까?`, "0");
            
            if (calInput === null) return; // 취소 누르면 중단
            
            const cal = parseInt(calInput);
            if (isNaN(cal)) {
                alert("숫자로 입력해주셔야 합니다!");
                return;
            }

            const newFood = { name, cal };
            
            // 데이터베이스에 추가 및 로컬 스토리지 저장
            customDB.push(newFood);
            localStorage.setItem('chan_custom_foods', JSON.stringify(customDB));
            foodDB = [...defaultDB, ...customDB]; // 전체 DB 갱신

            // 바로 선택 상태로 전환
            selectFood(newFood);
            alert(`'${name}' 등록 완료! 이제 언제든 검색 가능합니다.`);
        }

        function selectFood(food) {
            selectedFood = food;
            document.getElementById('addSection').classList.remove('hidden');
            document.getElementById('selectedName').innerText = food.name;
            document.getElementById('selectedUnitCal').innerText = `${food.cal} Kcal 기준`;
            window.scrollTo({ top: 150, behavior: 'smooth' });
        }

        function confirmAdd() {
            const amount = parseFloat(document.getElementById('amount').value);
            const total = Math.round(selectedFood.cal * amount);
            totalCals += total;
            addHistoryUI(selectedFood.name, total, amount);
            updateDisplay();
            document.getElementById('addSection').classList.add('hidden');
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResult').innerHTML = '';
            document.getElementById('amount').value = '1';
        }

        function addHistoryUI(name, total, amount) {
            const list = document.getElementById('historyList');
            const div = document.createElement('div');
            div.className = "flex justify-between items-center bg-white p-5 rounded-[1.5rem] border-l-[6px] border-l-rose-500 shadow-sm animate-in slide-in-from-bottom-3 duration-300";
            div.innerHTML = `<div><p class="font-black text-slate-800 italic uppercase text-lg tracking-tighter">${name}</p>
                <p class="text-[9px] text-slate-400 font-black tracking-widest uppercase">${amount} 개/인분</p></div>
                <div class="text-right"><p class="text-rose-500 font-black italic text-2xl tracking-tighter">${total.toLocaleString()}</p>
                <button onclick="this.parentElement.parentElement.remove(); totalCals-=${total}; updateDisplay();" class="text-[8px] text-slate-300 font-black uppercase tracking-widest">Delete</button></div>`;
            list.prepend(div);
        }

        function updateDisplay() {
            document.getElementById('totalDisplay').innerText = totalCals.toLocaleString();
            lucide.createIcons();
        }

        function resetAll() { 
            if(confirm("오늘의 식단 기록만 초기화하시겠습니까? (직접 등록한 음식 리스트는 유지됩니다)")) {
                totalCals = 0;
                document.getElementById('historyList').innerHTML = '';
                updateDisplay();
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
